    const css = `

      .bk{background:transparent;color:#484840;border:1px solid #242424;} .bk:hover{border-color:#b8966a;color:#b8966a;}

      .sub{font-family:'Jost',sans-serif;font-size:12px;color:#3c3c38;margin-bottom:26px;margin-top:4px;letter-spacing:.02em;}

      });

      const filteredEmp = EMPLOYEES.filter(e => {
        const q = search.toLowerCase();
        const ok = !q || [e.name, e.role, e.dept].some(s => s.toLowerCase().includes(q));
        return ok && (deptFilter === "All Departments" || e.dept === deptFilter);
      });

                          <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,color:"#605850"}}>{a.author}</span>
                          <span style={{color:"#282828"}}>·</span>
                          <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:"#343430"}}>{a.role}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* DOCUMENTS */}
              {active==="docs" && (
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:26}}>
                    <div>
                      <div className="lbl">Resources</div>
                      <div className="h1">Documents + Files</div>
                      <div className="sub">Company documents, templates, reports + shared resources.</div>
                    </div>
                    <button className="btn bg">+ Upload File</button>
                  </div>
                  <div className="card">
                    <div style={{display:"flex",gap:9,marginBottom:18}}>
                      <input className="inp" placeholder="Search documents..." style={{flex:1}} />
                      <select className="inp" style={{width:155}}>
                        {DEPTS.map(d => <option key={d}>{d}</option>)}
                      </select>
                    </div>
                    <div style={{borderBottom:"1px solid #1c1c1c",marginBottom:6}}>
                      <div style={{display:"flex",padding:"5px 7px",fontFamily:"'Jost',sans-serif",fontSize:9,color:"#282820",letterSpacing:".1em",textTransform:"uppercase"}}>
                        <span style={{width:56}}>Type</span>
                        <span style={{flex:1}}>Name</span>
                        <span style={{width:108}}>Department</span>
                        <span style={{width:66}}>Size</span>
                        <span style={{width:108,textAlign:"right"}}>Updated</span>
                      </div>
                    </div>
                    {DOCUMENTS.map((d,i) => (
                      <div key={i} className="dr" style={{display:"flex",alignItems:"center",padding:"11px 7px"}}>
                        <span className="pill" style={{background:`${TYPE_COLORS[d.type]}18`,color:TYPE_COLORS[d.type],width:50,textAlign:"center"}}>{d.type}</span>
                        <span style={{flex:1,fontFamily:"'Jost',sans-serif",fontSize:12,color:"#888070",paddingLeft:7}}>{d.name}</span>
                        <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:"#383830",width:108}}>{d.dept}</span>
                        <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:"#2a2a28",width:66}}>{d.size}</span>
                        <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:"#242420",width:108,textAlign:"right"}}>{d.updated}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* DIRECTORY */}
              {active==="directory" && (
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:26}}>
                    <div>
                      <div className="lbl">Our Team</div>
                      <div className="h1">Employee Directory</div>
                      <div className="sub">Principals, associates + staff · 100+ professionals · Atlanta, GA</div>
                    </div>
                    <div style={{display:"flex",gap:9}}>
                      <input className="inp" placeholder="Search name, role, dept..." style={{width:220}} value={search} onChange={e=>setSearch(e.target.value)} />
                      <select className="inp" style={{width:165}} value={deptFilter} onChange={e=>setDeptFilter(e.target.value)}>
                        {DEPTS.map(d => <option key={d}>{d}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
                    {filteredEmp.map((e,i) => (
                      <div key={i} className="card ec" style={{display:"flex",gap:13,alignItems:"flex-start",cursor:"pointer"}}>
                        <div className="av" style={{width:44,height:44}}>{e.avatar}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:600,color:"#908070",marginBottom:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.name}</div>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:"#383830",marginBottom:7,letterSpacing:".02em"}}>{e.role}</div>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,color:"#282820",marginBottom:6,letterSpacing:".02em"}}>{e.email}</div>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                            <span style={{fontFamily:"'Jost',sans-serif",fontSize:10,color:"#2a2a28"}}>{e.dept} · {e.ext}</span>
                            <span style={{display:"flex",alignItems:"center",gap:4,fontFamily:"'Jost',sans-serif",fontSize:9,color:STATUS_META[e.status][0],letterSpacing:".08em",textTransform:"uppercase"}}>
                              <span style={{width:5,height:5,borderRadius:"50%",background:STATUS_META[e.status][0],display:"inline-block"}} />
                              {STATUS_META[e.status][1]}
                            </span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* HR */}
              {active==="hr" && (
                <div>
                  <div className="lbl">People + Culture</div>
                  <div className="h1">HR + Policies</div>
                  <div className="sub">Benefits, policies, forms + company guidelines.</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12,marginBottom:24}}>
                    {HR_ITEMS.map((h,i) => (
                      <div key={i} className="card hc">
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:11}}>
                          <span style={{fontSize:24}}>{h.icon}</span>
                          {h.badge && <span className="pill" style={{background:"rgba(184,150,106,.12)",color:"#b8966a"}}>{h.badge}</span>}
                        </div>
                        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:"#d0c8c0",marginBottom:6}}>{h.title}</div>
                        <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,color:"#383830",lineHeight:1.7,marginBottom:13}}>{h.desc}</div>
                        <button className="btn bk" style={{fontSize:10,padding:"5px 13px"}}>View Resources →</button>
                      </div>
                    ))}
                  </div>
                  <div style={{background:"#111",border:"1px solid #1c1c1c",borderLeft:"3px solid #b8966a",borderRadius:4,padding:"18px 22px",marginBottom:14}}>
                    <div className="lbl" style={{marginBottom:8}}>Our Mission</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontStyle:"italic",color:"#686050",lineHeight:1.8}}>
                      "The mission of RJTR is to create + nurture a work environment which consistently exceeds the needs + expectations of our associates, our clients, + our principals."
                    </div>
                  </div>
                  <div className="card" style={{display:"flex",alignItems:"center",gap:18}}>
                    <span style={{fontSize:28}}>📞</span>
                    <div>
                      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:"#d0c8c0",marginBottom:4}}>Need HR Assistance?</div>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:"#383830",letterSpacing:".02em"}}>
                        <a href="mailto:careers@rjtrdesign.com">careers@rjtrdesign.com</a>
                        {" · "}
                        <a href="tel:7706611492">770-661-1492</a>
                        {" · 300 Galleria Pkwy, Suite 740, Atlanta, GA 30339"}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* QUICK LINKS */}
              {active==="tools" && (
                <div>
                  <div className="lbl">Tools + Resources</div>
                  <div className="h1">Quick Links</div>
                  <div className="sub">Fast access to the platforms + resources you use every day.</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(162px,1fr))",gap:11}}>
                    {QUICK_LINKS.map((l,i) => (
                      <div key={i} className="card lc" style={{textAlign:"center",padding:"20px 13px"}}>
                        <div style={{fontSize:26,marginBottom:9}}>{l.icon}</div>
                        <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,color:"#585048",letterSpacing:".1em",textTransform:"uppercase",marginBottom:8}}>{l.name}</div>
                        <div style={{width:18,height:2,background:l.color,borderRadius:1,margin:"0 auto",opacity:.55}} />
                      </div>
                    ))}
                  </div>
                  <div className="card" style={{marginTop:18}}>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:"#d0c8c0",marginBottom:12}}>Request a New Tool or Access</div>
                    <div style={{display:"flex",gap:9}}>
                      <input className="inp" placeholder="Tool or resource name..." style={{flex:1}} />
                      <input className="inp" placeholder="Business justification..." style={{flex:2}} />
                      <button className="btn bg">Submit</button>
                    </div>
                  </div>
                </div>
              )}

            </div>

            {/* Footer */}
            <div style={{padding:"13px 38px",borderTop:"1px solid #181818",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,color:"#222220",letterSpacing:".05em"}}>
                © 2026 Rule Joy Trammell + Rubio, LLC · Internal Use Only ·{" "}
                <a href="https://rjtrdesign.com" target="_blank" rel="noreferrer" style={{color:"#2e2e28"}}>rjtrdesign.com</a>
              </div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,color:"#222220",letterSpacing:".05em"}}>
                Portal v1.1 · IT Support: 770-661-1492
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Intranet />);
  </script>
</body>
